name: smart_event_app
description: "Smart Event App"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  # Firebase & Backend
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  # Core Utilities & Networking
  http: ^1.2.2
  flutter_riverpod: ^3.3.1
  uuid: ^4.5.3
  url_launcher: ^6.3.2
  csv: ^8.0.0

  # Hardware, Scanners & Notifications
  flutter_local_notifications: ^17.2.0
  qr_flutter: ^4.0.0
  mobile_scanner: ^7.2.0

  # UI, Styling & Animation
  cupertino_icons: ^1.0.8
  gap: ^3.0.1
  animated_text_kit: ^4.3.0
  google_fonts: ^8.0.2
  curved_navigation_bar: ^1.0.3
  flutter_screenutil: ^5.9.3
  flutter_native_splash: ^2.4.7
  google_sign_in: ^7.2.0
  flutter_dotenv: ^6.0.1
  file_picker: ^11.0.2
  sqflite: ^2.4.3
  flutter_svg: ^2.3.0
  shared_preferences: ^2.5.5
  app_links: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints
  flutter_lints: ^6.0.0

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application.
  uses-material-design: true

  # Registered assets
  assets:
    - .env
    - assets/image/smart.png
    - assets/image/google-icon-logo.svg

# Splash screen configuration
flutter_native_splash:
  color: "#fdf5f0"        # Colors.brown.shade50 ko hex
  image: assets/image/smart.png
  fullscreen: true
  